apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: mlops-hw1
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics
        uid: victoriametrics
        type: prometheus
        access: proxy
        url: http://victoriametrics:8428
        isDefault: true
        editable: true

      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://loki:3100
        editable: true