apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: mlops-hw1
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: 'ml-api-dashboard'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards