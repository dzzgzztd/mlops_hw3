apiVersion: v1
kind: ConfigMap
metadata:
  name: vmagent-config
  namespace: mlops-hw1
data:
  scrape.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: 'ml-api'
        metrics_path: /metrics
        static_configs:
          - targets:
              - 'ml-api-service:8000'
            labels:
              service: 'ml-api'