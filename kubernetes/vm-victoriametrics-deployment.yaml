apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoriametrics
  namespace: mlops-hw1
  labels:
    app: victoriametrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: victoriametrics
  template:
    metadata:
      labels:
        app: victoriametrics
    spec:
      containers:
        - name: victoriametrics
          image: victoriametrics/victoria-metrics:v1.112.0
          imagePullPolicy: IfNotPresent
          args:
            - "-storageDataPath=/victoria-metrics-data"
            - "-httpListenAddr=:8428"
            - "-retentionPeriod=7d"
          ports:
            - containerPort: 8428
              name: http
          volumeMounts:
            - name: vm-data
              mountPath: /victoria-metrics-data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: vm-data
          emptyDir: {}